edition = "2024";

package research_privacy_synthetic_tabular_data;

message SumMessage {
  int32 sum = 1;
}

message TestMessage {
  enum TestEnum {
    TEST_ENUM_UNSPECIFIED = 0;
    TEST_ENUM_VALUE1 = 1;
    TEST_ENUM_VALUE5 = 5;
  }

  TestEnum test_enum = 1;
  int32 test_int = 2;
  int64 test_long = 3;
  float test_float = 4;
  double test_double = 5;
  bool test_bool = 6;
  string test_string = 7;
  bytes test_bytes = 8;
  SumMessage test_message = 9;
  repeated int32 test_repeated_int = 10;

  oneof test_oneof {
    int32 test_oneof_int = 11;
    string test_oneof_string = 12;
  }

  MessageWithNestedFields test_message_with_nested_fields = 13;
}

message MessageWithNestedFields {
  int32 int_field = 1;
  string string_field = 2;
  SumMessage message_field = 3;
  SumMessage another_message_field = 4;
}
